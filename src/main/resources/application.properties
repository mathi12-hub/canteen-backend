# ==============================
# Server
# ==============================
server.port=${PORT:8080}
# ==============================
# MySQL Datasource
# Update these to match your local MySQL setup, or use env vars:
#   DB_URL, DB_USERNAME, DB_PASSWORD
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==============================
# JPA / Hibernate
# update -> creates/updates tables automatically to match entities (good for dev).
# Switch to "validate" once your schema is stable in a real deployment.
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jpa.open-in-view=false

# ==============================
# Sample data
# Set to false after first run if you don't want data re-inserted on restart,
# or rely on the "INSERT IGNORE"-style guard already built into data.sql.
# ==============================
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

